# ADC
CONFIG_ADC=y

# UART
CONFIG_SERIAL=y

# PWM
CONFIG_PWM=y

# Włączenie wsparcia dla %f (float) w printk
CONFIG_CBPRINTF_FP_SUPPORT=y

# USB CDC ACM — potrzebne bo overlay ustawia cdc_acm_uart0 jako konsolę
CONFIG_USB_DEVICE_STACK=y
CONFIG_USB_DEVICE_INITIALIZE_AT_BOOT=y
CONFIG_CONSOLE=y
CONFIG_UART_CONSOLE=y
CONFIG_UART_LINE_CTRL=y